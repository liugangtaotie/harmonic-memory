<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>Harmonic Memory</title>
<style>
  :root {
    --bg: #0e0c09;
    --surface: #171410;
    --surface2: #1f1b15;
    --border: rgba(255,255,255,0.055);
    --text: #e4dbcb;
    --text2: #9f9582;
    --text3: #6b6153;
    --accent: #c4a35a;
    --accent-dim: rgba(196,163,90,0.08);
    --ink-fact: #8ea4b8;
    --ink-preference: #c49e5e;
    --ink-decision: #8d9e8a;
    --ink-procedure: #7d9698;
    --ink-event: #b08b8b;
    --ink-concept: #9d92a8;
    --ink-question: #a09888;
    --radius: 2px;
    --radius-sm: 6px;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
    --ease-out: cubic-bezier(0, 0, 0.2, 1);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { background: var(--bg); }
  body {
    font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    line-height: 1.5;
    background: var(--bg);
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .app-header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(14,12,9,0.9); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 10px 16px 0;
    padding-top: max(10px, env(safe-area-inset-top));
  }
  .header-top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 10px;
  }
  .logo {
    font-size: 18px; font-weight: 450; letter-spacing: 0.02em;
    color: var(--text);
    font-feature-settings: "ss02", "cv05";
  }
  .logo em { font-style: normal; color: var(--text3); font-weight: 350; }
  .stat-text {
    font-size: 11px; color: var(--text3); font-feature-settings: "tnum";
    letter-spacing: 0.01em;
  }

  /* ── Search ── */
  .search-outer { padding: 0 16px 10px; }
  .search-wrap {
    display: flex; align-items: center; gap: 0;
    background: var(--surface); border: 1px solid var(--border);
    transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
  }
  .search-wrap:focus-within {
    border-color: rgba(196,163,90,0.3);
    box-shadow: 0 0 0 3px rgba(196,163,90,0.05);
  }
  .search-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 15px; padding: 10px 12px 10px 14px;
    font-family: inherit; letter-spacing: 0.01em;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-clear {
    display: none; align-items: center; justify-content: center;
    width: 34px; height: 34px; background: none; border: none;
    color: var(--text3); font-size: 15px; cursor: pointer; flex-shrink: 0;
    font-family: inherit; line-height: 1;
  }
  .search-clear.visible { display: flex; }
  .search-hint {
    font-size: 10px; color: var(--text3); padding: 5px 16px 0;
    letter-spacing: 0.02em;
  }

  /* ── Filters ── */
  .filter-row {
    display: flex; gap: 0; padding: 0 16px 2px;
    overflow-x: auto; scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 7px 0 9px; margin-right: 16px;
    font-size: 12px; font-weight: 450; color: var(--text3);
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    letter-spacing: 0.02em; font-family: inherit;
  }
  .chip.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .chip:not(.active):hover { color: var(--text2); }

  /* ── Content ── */
  .content { padding: 0 16px 80px; min-height: 60vh; }

  /* Results bar */
  .results-bar {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 0 10px; font-size: 11px; color: var(--text3);
    letter-spacing: 0.02em;
  }

  /* ── Cards ── */
  .card-list { display: flex; flex-direction: column; gap: 1px; }
  .card {
    background: var(--surface);
    padding: 16px 16px 16px 14px;
    position: relative; overflow: hidden;
    animation: cardIn 0.45s var(--ease-out) both;
    cursor: default;
  }
  .card + .card { border-top: 1px solid var(--border); }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    transition: width 0.2s var(--ease);
  }
  .card:active::before { width: 4px; }
  .card:active { background: var(--surface2); }

  /* Type accent colors — left edge strip */
  .card.type-fact::before        { background: var(--ink-fact); }
  .card.type-preference::before  { background: var(--ink-preference); }
  .card.type-decision::before    { background: var(--ink-decision); }
  .card.type-procedure::before   { background: var(--ink-procedure); }
  .card.type-event::before       { background: var(--ink-event); }
  .card.type-concept::before     { background: var(--ink-concept); }
  .card.type-question::before    { background: var(--ink-question); }
  .card.type-relationship::before{ background: var(--ink-preference); }
  .card.type-mem0_vector::before { background: var(--ink-concept); }
  .card.type-default::before     { background: var(--text3); }

  /* Card header */
  .card-top {
    display: flex; align-items: center; gap: 0; margin-bottom: 8px;
  }
  .type-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .card.type-fact .type-label        { color: var(--ink-fact); }
  .card.type-preference .type-label  { color: var(--ink-preference); }
  .card.type-decision .type-label    { color: var(--ink-decision); }
  .card.type-procedure .type-label   { color: var(--ink-procedure); }
  .card.type-event .type-label       { color: var(--ink-event); }
  .card.type-concept .type-label     { color: var(--ink-concept); }
  .card.type-question .type-label    { color: var(--ink-question); }
  .card.type-relationship .type-label{ color: var(--ink-preference); }
  .card.type-mem0_vector .type-label { color: var(--ink-concept); }
  .card.type-default .type-label     { color: var(--text3); }

  .card-source {
    font-size: 10px; color: var(--text3); font-weight: 400;
    margin-left: auto; letter-spacing: 0.02em;
  }
  .card-time {
    font-size: 10px; color: var(--text3); margin-left: 8px;
    font-feature-settings: "tnum"; letter-spacing: 0.02em;
  }

  /* Card body */
  .card-body {
    font-size: 14px; line-height: 1.7; color: var(--text2);
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Card footer */
  .card-foot {
    display: flex; align-items: center; gap: 6px; margin-top: 10px;
    flex-wrap: wrap;
  }
  .kw-tag {
    font-size: 10px; color: var(--text3); letter-spacing: 0.02em;
  }
  .kw-tag::before { content: '#'; color: var(--text3); opacity: 0.5; }

  /* Score indicator — subtle right-aligned */
  .score-dot {
    margin-left: auto; font-size: 9px; color: var(--text3);
    font-feature-settings: "tnum"; letter-spacing: 0.02em;
  }

  /* ── Skeleton ── */
  .skeleton { display: flex; flex-direction: column; }
  .sk-card {
    background: var(--surface); padding: 16px 16px 16px 14px;
    position: relative;
  }
  .sk-card + .sk-card { border-top: 1px solid var(--border); }
  .sk-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--border);
  }
  .sk-line {
    height: 10px; background: var(--surface2); animation: shimmer 2s ease-in-out infinite;
  }
  .sk-line.w80 { width: 80%; }
  .sk-line.w50 { width: 50%; }
  .sk-line.w30 { width: 30%; margin-top: 8px; }
  .sk-line + .sk-line { margin-top: 8px; }
  @keyframes shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* ── Empty ── */
  .empty-state { text-align: center; padding: 80px 20px; }
  .empty-mark {
    font-size: 13px; color: var(--text3); letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .empty-title { font-size: 16px; font-weight: 450; color: var(--text2); margin-bottom: 6px; }
  .empty-desc { font-size: 13px; color: var(--text3); line-height: 1.7; }

  /* ── Pull-to-refresh ── */
  .ptr {
    position: fixed; top: -48px; left: 50%; transform: translateX(-50%);
    z-index: 100; width: 32px; height: 32px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: top 0.25s var(--ease); box-shadow: 0 4px 16px rgba(0,0,0,0.7);
    font-size: 12px; color: var(--text3);
  }
  .ptr.down { top: 76px; }
  .ptr-spin {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 12px; padding: 8px 16px;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    letter-spacing: 0.02em; z-index: 200;
  }
  .toast.on { opacity: 1; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <span class="logo">Harmonic <em>Memory</em></span>
    <span class="stat-text" id="statText">—</span>
  </div>
</div>
<div class="search-outer">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="Search memories…" autofocus>
    <button class="search-clear" id="searchClear" aria-label="Clear">×</button>
  </div>
</div>
<div class="search-hint" id="searchHint">Browse all &middot; type to search &middot; pull down to refresh</div>

<div class="filter-row" id="filterRow">
  <span class="chip active" data-type="">All</span>
  <span class="chip" data-type="fact">Facts</span>
  <span class="chip" data-type="preference">Preferences</span>
  <span class="chip" data-type="procedure">Procedures</span>
  <span class="chip" data-type="concept">Concepts</span>
  <span class="chip" data-type="decision">Decisions</span>
  <span class="chip" data-type="event">Events</span>
  <span class="chip" data-type="question">Questions</span>
</div>

<div class="content" id="content">
  <div class="empty-state">
    <div class="empty-mark">Commonplace Book</div>
    <div class="empty-title">Your AI memory archive</div>
    <div class="empty-desc">Every conversation, distilled into searchable notes.<br>Memories appear here automatically.</div>
  </div>
</div>

<div class="ptr" id="ptr">↓</div>
<div class="toast" id="toast"></div>

<script>
  const API = '/api/v1';
  const PAGE_SIZE = 20;

  let activeType = '';
  let currentQuery = '';
  let currentOffset = 0;
  let totalResults = 0;
  let isLoading = false;
  let isRefreshing = false;
  let allResults = [];

  const TYPE_META = {
    preference:   { label: 'Preference',   color: 'type-preference' },
    fact:         { label: 'Fact',         color: 'type-fact' },
    concept:      { label: 'Concept',      color: 'type-concept' },
    procedure:    { label: 'Procedure',    color: 'type-procedure' },
    decision:     { label: 'Decision',     color: 'type-decision' },
    event:        { label: 'Event',        color: 'type-event' },
    question:     { label: 'Question',     color: 'type-question' },
    relationship: { label: 'Relationship', color: 'type-relationship' },
    mem0_vector:  { label: 'Mem0',         color: 'type-mem0_vector' },
  };
  const DEFAULT_META = { label: 'Memory', color: 'type-default' };

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('on');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('on'), 1800);
  }

  // ── Stats ──
  async function loadStats() {
    try {
      const r = await fetch(API + '/stats');
      const s = await r.json();
      document.getElementById('statText').textContent =
        `${s.total_memories.toLocaleString()} entries · ${s.ingestion_24h?.total || 0} today`;
    } catch(e) {}
  }

  // ── Debounce utility ──
  function debounce(fn, ms) {
    let timer;
    return function(...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), ms);
    };
  }

  // ── Throttle utility ──
  function throttle(fn, ms) {
    let last = 0;
    return function(...args) {
      const now = Date.now();
      if (now - last >= ms) { last = now; fn.apply(this, args); }
    };
  }

  // ── Search clear ──
  const si = document.getElementById('searchInput');
  const sc = document.getElementById('searchClear');
  const sh = document.getElementById('searchHint');
  si.addEventListener('input', () => {
    sc.classList.toggle('visible', si.value.length > 0);
  });
  sc.addEventListener('click', () => {
    si.value = ''; sc.classList.remove('visible'); si.focus();
    currentQuery = ''; sh.style.display = ''; resetAndSearch('');
  });

  // ── Filter chips ──
  document.getElementById('filterRow').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeType = chip.dataset.type;
    resetAndSearch(currentQuery);
  });

  // ── Search: Enter for immediate, debounce for type-ahead ──
  si.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      currentQuery = q;
      sh.style.display = 'none';
      resetAndSearch(q);
      // Cancel any pending debounced search
      if (si._debounceTimer) clearTimeout(si._debounceTimer);
    }
  });
  // Debounced search as user types (300ms after last keystroke)
  si.addEventListener('input', debounce(() => {
    const q = si.value.trim();
    if (q === currentQuery) return;
    currentQuery = q;
    sh.style.display = q ? 'none' : '';
    resetAndSearch(q);
  }, 300));

  function resetAndSearch(q) {
    currentOffset = 0; totalResults = 0; allResults = [];
    document.getElementById('content').innerHTML =
      '<div class="skeleton">' +
      Array.from({length:5}, (_,i) =>
        `<div class="sk-card" style="animation-delay:${i*0.08}s"><div class="sk-line w80"></div><div class="sk-line w50"></div><div class="sk-line w30"></div></div>`
      ).join('') + '</div>';
    doSearch(q, 0);
  }

  async function doSearch(q, offset = 0) {
    if (isLoading || isRefreshing) return;
    isLoading = true;

    try {
      const params = new URLSearchParams({ q, limit: String(PAGE_SIZE), offset: String(offset) });
      if (activeType) params.set('source', activeType);
      const res = await fetch(API + '/search-unified?' + params);
      const data = await res.json();

      totalResults = data.total;
      currentOffset = offset + data.results.length;

      if (offset === 0) {
        allResults = data.results;
        renderResults(data);
      } else {
        allResults = allResults.concat(data.results);
        appendResults(data.results);
      }
    } catch(e) {
      if (offset === 0) {
        document.getElementById('content').innerHTML =
          `<div class="empty-state"><div class="empty-mark">Error</div><div class="empty-title">Search failed</div><div class="empty-desc">Check if the server is running on port 18900</div></div>`;
      }
    } finally {
      isLoading = false;
    }
  }

  function renderResults(data) {
    const area = document.getElementById('content');
    if (!data.results.length) {
      area.innerHTML =
        `<div class="empty-state"><div class="empty-mark">No results</div><div class="empty-title">Nothing found</div><div class="empty-desc">Try a different term or clear the type filter</div></div>`;
      return;
    }

    let html = `<div class="results-bar"><span>${totalResults} result${totalResults !== 1 ? 's' : ''}</span><span>${data.latency_ms}ms</span></div><div class="card-list">`;
    data.results.forEach((r, i) => { html += buildCard(r, i); });
    html += '</div>';
    area.innerHTML = html;
  }

  function appendResults(results) {
    const list = document.getElementById('content').querySelector('.card-list');
    if (!list) return;
    const bar = document.querySelector('.results-bar span:first-child');
    if (bar) bar.textContent = `${totalResults} result${totalResults !== 1 ? 's' : ''}`;
    results.forEach((r, i) => {
      list.insertAdjacentHTML('beforeend', buildCard(r, allResults.length - results.length + i));
    });
  }

  function buildCard(r, i) {
    const row = r.row_data || {};
    const memType = row.type || r.source_type || 'unknown';
    const meta = TYPE_META[memType] || DEFAULT_META;
    const score = r.score ? Math.round(r.score > 1 ? r.score : r.score * 100) : 0;

    const time = r.timestamp ? new Date(r.timestamp).toLocaleString('zh-CN', {
      month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
    }) : '';

    const preview = escapeHtml(r.preview || row.content || '');
    const source = r.source_name || row.source || '';

    const kwRaw = row.keywords;
    const kwArr = Array.isArray(kwRaw) ? kwRaw
      : (typeof kwRaw === 'string' && kwRaw.trim() ? kwRaw.split(',').map(k => k.trim()).filter(Boolean) : []);
    const kwTags = kwArr.slice(0, 3).map(k => `<span class="kw-tag">${escapeHtml(k)}</span>`).join('');

    return `<div class="card ${meta.color}" style="animation-delay:${i*0.025}s">
      <div class="card-top">
        <span class="type-label">${meta.label}</span>
        ${source ? `<span class="card-source">${escapeHtml(source)}</span>` : ''}
        ${time ? `<span class="card-time">${time}</span>` : ''}
      </div>
      <div class="card-body">${preview}</div>
      <div class="card-foot">
        ${kwTags}
        ${score > 0 ? `<span class="score-dot">${score}%</span>` : ''}
      </div>
    </div>`;
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s || '';
    return div.innerHTML;
  }

  // ── Infinite scroll (throttled) ──
  const sentinel = document.createElement('div');
  sentinel.style.cssText = 'height:1px';
  document.body.appendChild(sentinel);
  const loadMore = throttle(() => {
    if (!isLoading && allResults.length < totalResults) {
      doSearch(currentQuery, currentOffset);
    }
  }, 500);
  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMore();
  }, { rootMargin: '400px' });
  observer.observe(sentinel);

  // ── Pull-to-refresh ──
  const ptrEl = document.getElementById('ptr');
  let startY = 0, pulling = false;
  const THRESHOLD = 80;

  document.addEventListener('touchstart', e => {
    if (window.scrollY > 5 || isLoading || isRefreshing) return;
    startY = e.touches[0].clientY; pulling = true;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 20) {
      ptrEl.classList.add('down');
      ptrEl.textContent = dy > THRESHOLD ? '⟳' : '↓';
    }
  }, { passive: true });

  document.addEventListener('touchend', async e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > THRESHOLD && window.scrollY <= 5) {
      isRefreshing = true;
      ptrEl.classList.add('down');
      ptrEl.innerHTML = '<div class="ptr-spin"></div>';
      showToast('Refreshing…');
      await resetAndSearch(currentQuery);
      ptrEl.textContent = '↓';
      ptrEl.classList.remove('down');
      isRefreshing = false;
      showToast('Refreshed');
    } else {
      ptrEl.classList.remove('down');
    }
  });

  // ── Init ──
  loadStats();
  doSearch('', 0);
  setInterval(loadStats, 60000);
  fetch(API + '/ingest-recent?max_files=3', { method: 'POST' }).catch(() => {});
</script>
</body>
</html>
